version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stocksense
    ports:
      - '5432:5432'
  backend:
    build: ./backend
    environment:
      STOCKSENSE_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/stocksense
    depends_on:
      - db
    ports:
      - '8000:8000'
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend
